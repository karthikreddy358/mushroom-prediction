services:
  - type: web
    name: mushroom-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_DEBUG
        value: false

  - type: web
    name: mushroom-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install ; npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
